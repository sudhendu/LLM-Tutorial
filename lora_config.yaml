# lora_config.yaml
model: "mlx-community/Llama-3.2-3B-Instruct-4bit"
train: true
data: "./data"
iters: 600
batch_size: 4
num_layers: 24
learning_rate: 2e-4

lora_parameters:
  rank: 32
  alpha: 64
  scale: 2.0
  dropout: 0.05
  keys:
    - "self_attn.q_proj"
    - "self_attn.k_proj"
    - "self_attn.v_proj"
    - "self_attn.o_proj"
    - "mlp.gate_proj"
    - "mlp.down_proj"
    - "mlp.up_proj"
